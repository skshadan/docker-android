services:
  android-emulator:
    build:
      context: .
      args:
        - API_LEVEL=33
        - CMD_LINE_VERSION=11076708_latest
        - IMG_TYPE=google_apis
    ports:
      - 5554:5554
      - 127.0.0.1:5555:5555
      - ${SCRCPY_WEB_BIND:-127.0.0.1}:8000:8000
    environment:
      - DISABLE_ANIMATION=false
      - DISABLE_HIDDEN_POLICY=true
      - SKIP_AUTH=true
      - SCRCPY_WEB_ENABLED=true
      - SCRCPY_WEB_PORT=8000
      - SCRCPY_WEB_PUBLIC_URL=${SCRCPY_WEB_PUBLIC_URL:-http://localhost:8000/}
      #- ANDROID_ADB_SERVER_ADDRESS=host.docker.internal
      - MEMORY=6144
      - CORES=4
      - SNAPSHOT=true
    privileged: true
    tty: true
    stdin_open: true
    volumes:
      - ./keys/adbkey:/root/.android/adbkey:ro
      - ./keys/adbkey.pub:/root/.android/adbkey.pub:ro
      - ./android_avd:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  android-emulator-cuda:
    build:
      context: .
      dockerfile: ./Dockerfile.gpu
      args:
        - API_LEVEL=33
        - CMD_LINE_VERSION=11076708_latest
        - IMG_TYPE=google_apis
    ports:
      - 5554:5554
      - 127.0.0.1:5555:5555
      - ${SCRCPY_WEB_BIND:-127.0.0.1}:8000:8000
    environment:
      - DISABLE_ANIMATION=false
      - DISABLE_HIDDEN_POLICY=true
      - SKIP_AUTH=true
      - SCRCPY_WEB_ENABLED=true
      - SCRCPY_WEB_PORT=8000
      - SCRCPY_WEB_PUBLIC_URL=${SCRCPY_WEB_PUBLIC_URL:-http://localhost:8000/}
      #- ANDROID_ADB_SERVER_ADDRESS=host.docker.internal
      - MEMORY=6144
      - CORES=4
      - SNAPSHOT=true
    privileged: true
    tty: true
    stdin_open: true
    volumes:
      - ./keys/adbkey:/root/.android/adbkey:ro
      - ./keys/adbkey.pub:/root/.android/adbkey.pub:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  android-emulator-cuda-store:
    build:
      context: .
      dockerfile: ./Dockerfile.gpu
      args:
        - API_LEVEL=33
        - CMD_LINE_VERSION=11076708_latest
        - IMG_TYPE=google_apis_playstore
    ports:
      - 5554:5554
      - 127.0.0.1:5555:5555
      - ${SCRCPY_WEB_BIND:-127.0.0.1}:8000:8000
    environment:
      - DISABLE_ANIMATION=false
      - DISABLE_HIDDEN_POLICY=true
      - SKIP_AUTH=true
      - SCRCPY_WEB_ENABLED=true
      - SCRCPY_WEB_PORT=8000
      - SCRCPY_WEB_PUBLIC_URL=${SCRCPY_WEB_PUBLIC_URL:-http://localhost:8000/}
      #- ANDROID_ADB_SERVER_ADDRESS=host.docker.internal
      - MEMORY=6144
      - CORES=4
      - SNAPSHOT=true
    privileged: true
    tty: true
    stdin_open: true
    volumes:
      - ./keys/adbkey:/root/.android/adbkey:ro
      - ./keys/adbkey.pub:/root/.android/adbkey.pub:ro
    # volumes:
    #   - ./:/mnt
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
